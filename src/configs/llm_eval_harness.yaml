backend: local-completions

model_args:
  # model: "qwen2.5:3b" can be removed its just metadata
  base_url: "http://127.0.0.1:8000/v1/completions"
  tokenizer_backend: "none"
  tokenized_requests: false
  eos_string: "<|im_end|>"
  num_concurrent: 2
  timeout: 180

system_instruction: |
  Solve the math problem step by step.
  At the end, output the final answer on its own line in exactly this format:
  #### <number>
  Do not put anything after the final answer line.

tasks:
  - gsm8k

num_fewshot: 2
batch_size: 1
limit: 10
log_samples: false
write_out: True
bootstrap_iters: 10
